# Local Apache Iceberg (REST catalog + MinIO) สำหรับ dev/staging แทน cloud จริง
# =============================================================================
# ใช้:  docker compose -f dev/iceberg/docker-compose.yml up -d
# หยุด: docker compose -f dev/iceberg/docker-compose.yml down
#
# rest   → Iceberg REST catalog (localhost:8181)
# minio  → S3-compatible storage (localhost:9000, console :9001) creds admin/password
# mc     → สร้าง bucket "warehouse" ตอน start
# creds เป็นของ local dev เท่านั้น (ไม่ใช่ secret จริง) — ห้ามใช้ค่าพวกนี้บน prod

services:
  rest:
    image: tabulario/iceberg-rest:1.6.0
    container_name: pda-iceberg-rest
    ports:
      - "8181:8181"
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
      - CATALOG_WAREHOUSE=s3://warehouse/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
    depends_on:
      - minio
    networks:
      iceberg_net:

  minio:
    image: minio/minio
    container_name: pda-iceberg-minio
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
      - MINIO_DOMAIN=minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: ["server", "/data", "--console-address", ":9001"]
    networks:
      iceberg_net:
        aliases:
          - warehouse.minio

  mc:
    image: minio/mc
    container_name: pda-iceberg-mc
    depends_on:
      - minio
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
    # ใช้ `mc alias set` (คำสั่งใหม่ — `mc config host add` ถูก deprecated ใน image ล่าสุด)
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set minio http://minio:9000 admin password) do echo '...waiting for minio...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing minio/warehouse;
      /usr/bin/mc anonymous set public minio/warehouse;
      tail -f /dev/null
      "
    networks:
      iceberg_net:

  trino:
    image: trinodb/trino:476
    container_name: pda-iceberg-trino
    ports:
      - "8080:8080"
    depends_on:
      - rest
      - minio
    volumes:
      - ./trino/iceberg.properties:/etc/trino/catalog/iceberg.properties:ro
    networks:
      iceberg_net:

networks:
  iceberg_net:
